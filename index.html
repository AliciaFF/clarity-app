<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/clarity-logo.png" />
    <link rel="apple-touch-icon" href="/clarity-logo.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Clarity" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clarity</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Si l'appli ne monte pas dans les 5s, vider le cache SW et recharger
      var _clarity_timeout = setTimeout(function() {
        if (!document.getElementById('root').hasChildNodes()) {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
              caches.keys().then(function(keys) {
                keys.forEach(function(k) { caches.delete(k); });
                window.location.reload();
              });
            });
          }
        }
      }, 5000);
      window.addEventListener('load', function() {
        setTimeout(function() {
          if (document.getElementById('root').hasChildNodes()) clearTimeout(_clarity_timeout);
        }, 100);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
